[build]
  command = "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
  startCommand = "cd backend && gunicorn config.wsgi:application"
  env = "Python"

[env]
  DATABASE_URL = { required = true }
  SECRET_KEY = { required = true }
  DEBUG = "False"
  ALLOWED_HOSTS = "*.onrender.com"
  CORS_ALLOWED_ORIGINS = "https://room-rental-management-system.vercel.app"